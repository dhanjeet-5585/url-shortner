<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Snip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">/s</span>
        Snip
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start turning long links into short ones.</p>

      <div id="form-msg" class="form-msg"></div>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="name">Username</label>
          <input type="text" id="username" name="name" placeholder=" username" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" />
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" name="confirm" placeholder="Re-enter password" required minlength="6" />
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
        const form = document.getElementById("signup-form");

        form.addEventListener("submit", async function (e) {
            e.preventDefault(); // Prevent page refresh
            // confirm password 
            const user_pass = document.getElementById("password").value;
            const confirm_pass = document.getElementById("confirm").value;
            if (user_pass !== confirm_pass) {
                alert("Both passwords do not match");
                return;
            }


           
            const userData = {
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
            };

            try {
                const response = await fetch("/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                console.log(data);

                if (response.ok) {
                    alert("Signup Successful");
                    window.location.href = "index.html";
                } else {
                    alert(data.error || "Signup Failed");
                }

            } catch (err) {
                console.error(err);
                alert("Server Error");
            }
            

        });

            


  </script>
</body>
</html>
