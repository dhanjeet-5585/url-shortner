<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Snip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">/s</span>
        Snip
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to see your short links.</p>

      <div id="form-msg" class="form-msg"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required />
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const loginform = document.getElementById('login-form');
    loginform.addEventListener('submit', async function (e) {
        e.preventDefault();
        const userData = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };
        
        try {
            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
               
                body: JSON.stringify(userData)
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = "dashboard.html";
            } else {
                // Changed from data.error to data.err to match your backend payload
                alert(data.err || "Login Failed"); 
            }
        } catch (error) {
            console.error(error); // <-- Fixed typo (was 'err')
            alert("Server Error");
        }
    });
  </script>
</body>
</html>
