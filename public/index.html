<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — Shorten your links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .home-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .home-shell .brand {
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 14px;
    }
    .home-shell .brand-mark { width: 36px; height: 36px; font-size: 1.05rem; border-radius: 10px; }
    .home-tagline {
      color: var(--muted);
      max-width: 380px;
      margin: 0 auto 32px;
      font-size: 1rem;
    }
    .home-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="home-shell">
    <div>
      <div class="brand">
        <span class="brand-mark">/s</span>
        Snip
      </div>
      <p class="home-tagline">Turn long, unwieldy links into short ones you can actually share — and keep track of every one you make.</p>
      <div class="home-actions">
        <a href="login.html" class="btn btn-ghost">Log in</a>
        <a href="signup.html" class="btn btn-primary">Sign up</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const login_button = document.querySelector('#btn btn-ghost')
    login_button.addEventListener('click',async (e)=>{
        const response = await fetch('http://localhost:8000')
    })
  </script>
  <script>
    // Skip the landing page entirely if already logged in.
    if (Api.isLoggedIn()) {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
