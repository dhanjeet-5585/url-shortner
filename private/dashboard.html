<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My URLs — Snip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">/s</span>
      Snip
    </div>
    <div class="topbar-right">
      <span class="user-chip">Signed in as <strong id="user-name">—</strong></span>
      <button id="my-urls-btn" class="btn btn-ghost">My URLs</button>
      <button id="logout-btn" class="btn btn-ghost">Sign out</button>
    </div>
  </header>

  <main class="page">
    <div class="page-header">
      <h1>My URLs</h1>
      <p>Shorten a new link, or manage the ones you've already made.</p>
    </div>

    <section class="generator">
      <form id="generate-form">
        <div class="generator-row">
          <input type="url" id="long-url" placeholder="https://your-long-link.com/goes/here" required />
          <button type="submit" id="generate-btn" class="btn btn-primary">Shorten</button>
        </div>
        <div id="generate-msg" class="form-msg" style="margin-top:12px;"></div>
      </form>
    </section>

    <div class="section-label">
      <h2>Your links</h2>
      <span class="count"><span id="url-count">0</span> total</span>
    </div>

    <div id="url-list" class="stub-list">
      <div style="color: #666; font-style: italic; padding: 12px 0;">Click "My URLs" above to view your generated links.
      </div>
    </div>
  </main>

  <script>
    console.log("Dashboard JS loaded");

    // Initialize application data on load
    document.addEventListener("DOMContentLoaded", () => {
      fetchUserData(); // Keep this so the username mounts instantly
      // REMOVED: fetchUserURLs() from here so the list stays hidden/empty initially
    });

    // 1. Fetch and display the logged-in user's name
    async function fetchUserData() {
      try {
        const response = await fetch("/api/username");
        if (response.ok) {
          const data = await response.json();
          document.getElementById("user-name").textContent = data.username || "User";
        } else {
          document.getElementById("user-name").textContent = "Guest";
        }
      } catch (err) {
        console.error("Error fetching user data:", err);
        document.getElementById("user-name").textContent = "Error";
      }
    }

    // 2. Fetch and render links generated by the current user
    async function fetchUserURLs() {
      const urlListContainer = document.getElementById("url-list");
      const countSpan = document.getElementById("url-count");

      try {
        const response = await fetch("/api/my-urls");
        if (!response.ok) throw new Error("Failed to fetch URLs");

        const urls = await response.json();
        countSpan.textContent = urls.length;

        if (urls.length === 0) {
          urlListContainer.innerHTML = `<div class="no-links">You haven't generated any short URLs yet.</div>`;
          return;
        }

        // This updates the container to render BOTH buttons inside a button group container
        urlListContainer.innerHTML = urls.map((item) => {
          const fullShortUrl = `${window.location.origin}/${item.shortId}`;
          return `
        <div class="url-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; border: 1px solid #eee; border-radius: 6px; background-color: #fff;">
            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%;">
                <strong style="display: block; color: var(--primary-color);">${fullShortUrl}</strong>
                <small style="color: #666;">${item.redirectedUrl}</small>
            </div>
            <div style="display: flex; gap: 8px; flex-shrink: 0;">
                <button type="button" class="btn btn-secondary" onclick="copySpecificURL('${fullShortUrl}')">Copy</button>
                <button type="button" class="btn btn-danger" style="background-color: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500;" onclick="deleteURL('${item.shortId}')">Delete</button>
            </div>
        </div>
      `;
        }).join("");

      } catch (err) {
        console.error("Error fetching links:", err);
        urlListContainer.innerHTML = `<div class="error-msg">Failed to load links.</div>`;
      }
    }
    async function deleteURL(id) {
      if (!confirm("Are you sure you want to delete this URL?")) return;

      try {
        const response = await fetch(`/api/myurls/${id}`, {
          method: "DELETE"
        });

        if (response.ok) {
          alert("URL deleted successfully!");
          fetchUserURLs(); // Instantly refresh the view layer
        } else {
          const data = await response.json();
          alert(data.error || "Failed to delete URL");
        }
      } catch (err) {
        console.error("Error during deletion:", err);
      }
    }

    // New Sign Out Functionality
    async function handleSignOut() {
      try {
        // Tell backend to clear cookie wrapper
        const response = await fetch("/api/signout", { method: "POST" });

        // Redirect user to landing page or login page
        window.location.href = "/index.html";
      } catch (err) {
        console.error("Error signing out:", err);
      }
    }

    async function copyURL() {
      const input = document.getElementById("short-url");
      if (!input) return;
      await performCopy(input.value);
    }

    async function copySpecificURL(text) {
      await performCopy(text);
    }

    async function performCopy(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("URL copied successfully!");
      } catch (err) {
        console.error("Failed to copy:", err);
      }
    }

    //add event listner for signout 
    document.getElementById("logout-btn").addEventListener("click",(e) => {
      handleSignOut();
    })


    // "My URLs" navigation button listener
    document.getElementById("my-urls-btn").addEventListener("click", () => {
      // Smoothly scroll down to the links list section
      document.querySelector(".section-label").scrollIntoView({ behavior: "smooth" });

      // NOW FETCHES AND REVEALS THE LIST ONLY ON CLICK
      fetchUserURLs();
    });

    const form = document.getElementById("generate-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      console.log("Form submitted");

      try {
        const longUrl = document.getElementById("long-url").value;

        const response = await fetch("/url", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            url: longUrl,
          }),
        });

        const data = await response.json();

        const msg = document.getElementById("generate-msg");
        msg.classList.add("show");
        msg.classList.add("success");

        msg.innerHTML = `
            <div class="result-card">
                <h3>✅ Short URL Created</h3>
                <input type="text" value="${data.shortURL}" readonly id="short-url">
                <button type="button" onclick="copyURL()">Copy</button>
            </div>
            `;

        // REMOVED: fetchUserURLs() from here so the list doesn't update or reveal itself when a new URL is generated.

      } catch (err) {
        console.error(err);
      }
    });
  </script>
</body>

</html>
